<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Java | Javaisland</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-yellow-50">
    <nav
      class="bg-[#15B392] fixed mt-2 top-4 left-1/2 transform -translate-x-1/2 w-10/12 max-w-screen-lg rounded-full py-4 z-50 shadow-sm"
    >
      <div class="flex justify-evenly items-center px-16">
        <ul class="flex space-x-20">
          <li>
            <a href="index.html" class="text-white relative garis font-bold"
              >HOME</a
            >
          </li>
          <li>
            <a href="#" class="text-white relative garis font-semibold"
              >GUIDE TOUR</a
            >
          </li>
        </ul>
        <div class="text-white text-xl font-bold">LOGO</div>
        <ul class="flex space-x-20">
          <li>
            <a
              href="aijava.html"
              class="text-[#D2FF72] relative garis font-semibold"
              >AI JAVA</a
            >
          </li>
          <li>
            <a href="login.html" class="text-white relative garis font-semibold"
              >ABOUT</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <div class="container mx-auto mt-52 bg-white shadow-lg rounded-lg p-6">
      <div class="bg-[#15B392] text-center py-2 rounded-t-lg">
        <h1 class="text-white text-2xl font-bold">AI Java</h1>
      </div>
      <div class="text-center mt-4">
        <p class="text-gray-600">Tanyakan Apa Saja Tentang Jawa</p>
      </div>
      <div class="flex justify-between mt-6">
        <div class="flex items-center space-x-4">
          <div class="w-10 h-10 rounded-full bg-gray-300"></div>
          <div class="bg-[#15B392] text-white p-4 rounded-lg">
            <p>Ada apa saja di Jawa?</p>
          </div>
        </div>
        <div class="flex items-center space-x-4">
          <div class="bg-gray-800 text-white p-4 rounded-lg max-w-md">
            <p>Banyak sekali, terdapat blablabla blablabla...</p>
          </div>
          <div class="w-10 h-10 rounded-full bg-gray-300"></div>
        </div>
      </div>
    </div>

    <!-- Input dari pengguna -->
    <input
      id="userInput"
      class="border p-2 rounded-lg w-full"
      placeholder="Tanyakan sesuatu tentang Jawa..."
    />

    <button
      onclick="askAI()"
      class="mt-4 bg-[#15B392] text-white px-4 py-2 rounded-lg"
    >
      Tanya
    </button>

    <div id="aiResponse" class="mt-6 bg-gray-200 p-4 rounded-lg">
      <p>Menunggu jawaban...</p>
    </div>

    <script>
      async function getResponseFromGemini(userInput) {
        try {
          const response = await fetch(
            "https://api.gemini.com/v1/your-endpoint",
            {
              method: "POST", // Jika API menggunakan metode POST
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer YOUR_API_KEY", // Jika API membutuhkan authentication
              },
              body: JSON.stringify({
                input: userInput,
              }),
            }
          );

          const data = await response.json();
          return data; // Mengembalikan respons dari API
        } catch (error) {
          console.error("Error fetching data from API:", error);
        }
      }

      // Memanggil fungsi dengan input dari pengguna
      const userInput = "Apa saja yang ada di Jawa?";
      getResponseFromGemini(userInput).then((response) => {
        console.log(response); // Menggunakan respons dari API Gemini
      });

      async function askAI() {
        const userInput = document.getElementById("userInput").value;
        const response = await getResponseFromGemini(userInput);

        document.getElementById("aiResponse").innerHTML = `<p>${response}</p>`;
      }
    </script>
  </body>
</html>
