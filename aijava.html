    <script>
     async function sendQuestion(event) {
    event.preventDefault();  // Mencegah form dari reload halaman
    const inputElement = document.getElementById('userinput');
    const question = inputElement.value;

    // Menampilkan pertanyaan user di atas
    const chatbox = document.getElementById('chatbox');
    const userMessage = `<div class="user-message bg-[#D2FF72] p-3 rounded-md my-2">Anda: ${question}</div>`;
    chatbox.innerHTML += userMessage;
    inputElement.value = "";  // Kosongkan input setelah mengirim

    // Menampilkan loading saat menunggu jawaban AI
    const loadingMessage = `<div id="loading" class="ai-message bg-gray-200 p-3 rounded-md my-2">JavaIsland: Sedang memproses...</div>`;
    chatbox.innerHTML += loadingMessage;
    chatbox.scrollTop = chatbox.scrollHeight;  // Scroll ke bawah untuk menampilkan pesan terbaru

    // Mengirim pertanyaan ke API Gemini
    try {
        const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=AIzaSyCuwiQEUm3fSu3sVXpwbeB4_nHmwS104_s', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                contents: [
                    {
                        parts: [
                            { text: question }
                        ]
                    }
                ]
            })
        });

        if (!response.ok) {
            throw new Error(`HTTP error! Status: ${response.status}`);
        }

        const data = await response.json();
        
        // Pastikan bahwa respons dari API sesuai harapan
        if (data && data.contents && data.contents[0] && data.contents[0].parts && data.contents[0].parts[0].text) {
            const aiResponse = data.contents[0].parts[0].text;  // Sesuaikan dengan struktur respons dari API Gemini

            // Menampilkan jawaban dari AI
            document.getElementById('loading').remove();  // Hapus pesan loading
            const aiMessage = `<div class="ai-message bg-[#F0F0F0] p-3 rounded-md my-2">JavaIsland: ${aiResponse}</div>`;
            chatbox.innerHTML += aiMessage;
            chatbox.scrollTop = chatbox.scrollHeight;  // Scroll ke bawah
        } else {
            throw new Error('Respons tidak sesuai dengan struktur yang diharapkan');
        }

    } catch (error) {
        document.getElementById('loading').remove();  // Hapus pesan loading jika error
        const errorMessage = `<div class="ai-message bg-red-200 p-3 rounded-md my-2">JavaIsland: Maaf, ada masalah dengan koneksi atau respons. Error: ${error.message}</div>`;
        chatbox.innerHTML += errorMessage;
    }
}
